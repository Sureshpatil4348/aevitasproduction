[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The redirect to index.html is not needed for Next.js and can cause issues
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
#   force = false
  
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000 